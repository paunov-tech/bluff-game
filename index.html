<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.disableVerticalSwipes?.();
      window.Telegram.WebApp.setHeaderColor?.("#04060f");
      window.Telegram.WebApp.setBackgroundColor?.("#04060f");
    }
  </script>
  <meta name="description" content="BLUFF — The AI Deception Game. Find the fake fact among 5 surprising statements." />
  <meta name="theme-color" content="#08080f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BLUFF" />
  <link rel="manifest" href="/manifest.json" />
  <title>BLUFF™ — The AI Deception Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080f; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #root { min-height: 100vh; min-height: 100dvh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
