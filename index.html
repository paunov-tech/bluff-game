<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="BLUFF — The AI Deception Game. Find the fake fact among 5 surprising statements." />
  <meta name="theme-color" content="#08080f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BLUFF" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>BLUFF™ — The AI Deception Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080f; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #root { min-height: 100vh; min-height: 100dvh; }
    .dvh-screen { min-height: 100vh; min-height: 100dvh; }
    button, input, textarea, select, a { outline: none; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, a:focus-visible {
      outline: 2px solid rgba(232,197,71,0.75);
      outline-offset: 2px;
      border-radius: 6px;
    }
    button:disabled { cursor: not-allowed; opacity: 0.45; }
  </style>
  <style>
    /* Shop buy button glow */
    button[style*="linear-gradient(135deg,#e8c547"] {
      box-shadow: 0 0 20px rgba(232,197,71,0.45),
                  0 4px 12px rgba(232,197,71,0.25) !important;
      transition: box-shadow 0.3s ease !important;
    }
    button[style*="linear-gradient(135deg,#e8c547"]:hover {
      box-shadow: 0 0 32px rgba(232,197,71,0.65),
                  0 6px 20px rgba(232,197,71,0.35) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
